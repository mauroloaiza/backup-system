version: "3.9"

# =============================================================
# BackupSMC — Deploy en EC2 compartido (instancia DEV)
# Project: backupsmc-dev
# Puerto externo: 3100
# =============================================================

services:
  server:
    image: backupsmc-dev-server:latest
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: backupsmc-dev-server
    restart: unless-stopped
    env_file: .env
    expose:
      - "8000"
    volumes:
      - backups_data:/var/backups/backupsmc
    networks:
      - backupsmc-dev

  frontend:
    image: backupsmc-dev-frontend:latest
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: backupsmc-dev-frontend
    restart: unless-stopped
    ports:
      - "3100:80"
    depends_on:
      - server
    volumes:
      - downloads_data:/usr/share/nginx/downloads:ro
    networks:
      - backupsmc-dev

volumes:
  backups_data:
  downloads_data:

networks:
  backupsmc-dev:
    driver: bridge
