<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background rounded square so the favicon has presence on dark/light tabs -->
  <rect width="64" height="64" rx="14" fill="#4361ee"/>

  <!-- Legs (drawn first so they sit behind the body) -->
  <g stroke="#1e2a5c" stroke-width="2.4" stroke-linecap="round" fill="none">
    <path d="M26 34 L18 30"/>
    <path d="M26 36 L18 42"/>
    <path d="M32 34 L32 24"/>
    <path d="M32 36 L32 46"/>
    <path d="M38 34 L46 30"/>
    <path d="M38 36 L46 42"/>
  </g>

  <!-- Three body segments (ant anatomy is THE defining trait) -->
  <!-- Abdomen (back) -->
  <ellipse cx="44" cy="35" rx="9" ry="7.5" fill="#0b1538"/>
  <!-- Thorax (middle) -->
  <circle cx="32" cy="35" r="5.5" fill="#0b1538"/>
  <!-- Head (front) -->
  <circle cx="22" cy="33" r="6.5" fill="#0b1538"/>

  <!-- Antennae -->
  <g stroke="#0b1538" stroke-width="2" stroke-linecap="round" fill="none">
    <path d="M19 28 Q17 21 21 18"/>
    <path d="M23 27 Q23 20 27 18"/>
  </g>
  <circle cx="21" cy="18" r="1.6" fill="#0b1538"/>
  <circle cx="27" cy="18" r="1.6" fill="#0b1538"/>

  <!-- Friendly eye -->
  <circle cx="24" cy="32" r="1.6" fill="#ffffff"/>
  <circle cx="24.4" cy="32.2" r="0.8" fill="#0b1538"/>

  <!-- Backup "disk" being carried on the abdomen -->
  <rect x="40" y="26" width="10" height="6" rx="1.2" fill="#ffffff"/>
  <circle cx="45" cy="29" r="1.4" fill="#4361ee"/>
  <rect x="42" y="27" width="2" height="1.2" fill="#4361ee"/>
</svg>
