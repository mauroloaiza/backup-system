name: Release

# Deshabilitado — los binarios se publican manualmente con scripts/publish-agent.sh
# Para reactivar: descomentar el bloque on:
on:
  workflow_dispatch:  # solo manual desde GitHub UI
#  push:
#    tags:
#      - "v*.*.*"

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/smcsoluciones/backup-system

jobs:
  # ─────────────────────────────────────────────────────────
  # Build y push imágenes Docker
  # ─────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push Docker images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version tag
        id: meta
        run: echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      - name: Build & push server
        uses: docker/build-push-action@v6
        with:
          context: ./server
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-server:${{ steps.meta.outputs.VERSION }}
            ${{ env.IMAGE_PREFIX }}-server:latest

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-frontend:${{ steps.meta.outputs.VERSION }}
            ${{ env.IMAGE_PREFIX }}-frontend:latest

  # ─────────────────────────────────────────────────────────
  # Compilar agente Windows
  # ─────────────────────────────────────────────────────────
  build-agent-windows:
    name: Build Agent Windows
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: agent/go.sum

      - name: Build
        working-directory: agent
        env:
          CGO_ENABLED: "0"
          GOOS: windows
          GOARCH: amd64
        run: |
          go build -ldflags="-w -s -X main.Version=${GITHUB_REF_NAME}" \
            -o bin/backupsmc-agent-windows-amd64.exe \
            ./cmd/agent/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: agent-windows-amd64
          path: agent/bin/

  # ─────────────────────────────────────────────────────────
  # Compilar agente Linux (multi-arch, binario estático)
  # ─────────────────────────────────────────────────────────
  build-agent-linux:
    name: Build Agent Linux (${{ matrix.goarch }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - goarch: amd64
            cc: ""
          - goarch: arm64
            cc: aarch64-linux-gnu-gcc
          - goarch: arm
            cc: arm-linux-gnueabihf-gcc

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: agent-linux/go.sum

      - name: Install cross-compilers
        if: matrix.goarch != 'amd64'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y gcc-aarch64-linux-gnu gcc-arm-linux-gnueabihf

      - name: Build
        working-directory: agent-linux
        env:
          CGO_ENABLED: "0"
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
        run: |
          go build -ldflags="-w -s -X main.version=${GITHUB_REF_NAME}" \
            -o bin/backupsmc-agent-linux-${{ matrix.goarch }} \
            ./cmd/backupsmc-agent/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: agent-linux-${{ matrix.goarch }}
          path: agent-linux/bin/

  # ─────────────────────────────────────────────────────────
  # Crear GitHub Release con binarios y changelog
  # ─────────────────────────────────────────────────────────
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-and-push, build-agent-windows, build-agent-linux]
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all agent artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/**/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') }}
